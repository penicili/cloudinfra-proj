# Reverse proxy ke service Flask (app:5000) di jaringan bridge Docker.
# Hanya konfigurasi — tidak ada custom code.

server {
    listen 80;
    server_name _;

    # Jangan tulis ulang Location dari redirect 301 milik Flask.
    proxy_redirect off;

    location / {
        proxy_pass http://app:5000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
